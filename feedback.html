<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback — Pinky Bakery</title>
    <style>
        /* Global Reset & Premium Black and White Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .feedback-card {
            background-color: #0a0a0a;
            border: 1px solid #222222;
            padding: 40px 35px;
            width: 100%;
            max-width: 480px;
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
        }

        .feedback-card h1 {
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .feedback-card p {
            color: #888888;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #cccccc;
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        .required {
            color: #ffffff;
            opacity: 0.6;
        }

        /* Inputs & Select Elements */
        input[type="text"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px 14px;
            background-color: #121212;
            border: 1px solid #333333;
            border-radius: 6px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus,
        select:focus {
            border-color: #ffffff;
        }

        /* Rating Group */
        .rating-options {
            display: flex;
            justify-content: space-between;
            background-color: #121212;
            border: 1px solid #333333;
            padding: 12px 16px;
            border-radius: 6px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            color: #ffffff;
            cursor: pointer;
            margin-bottom: 0;
        }

        .radio-label input[type="radio"] {
            accent-color: #ffffff;
            cursor: pointer;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }

        .submit-btn:hover {
            background-color: #e0e0e0;
        }

        .submit-btn:disabled {
            background-color: #555555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="feedback-card">
        <h1>Customer Feedback</h1>
        <p>Help us improve your experience with your valuable feedback.</p>

        <!-- Formspree Integration -->
        <form id="feedbackForm" action="https://formspree.io/f/mbdvpyyl" method="POST">

            <!-- 1. Your Name (Required) -->
            <div class="form-group">
                <label for="name">Your Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required autocomplete="off">
            </div>

            <!-- 2. Rate Website from 1 to 5 (Required) -->
            <div class="form-group">
                <label>Rate Website (1 to 5) <span class="required">*</span></label>
                <div class="rating-options">
                    <label class="radio-label"><input type="radio" name="website_rating" value="1" required> 1</label>
                    <label class="radio-label"><input type="radio" name="website_rating" value="2"> 2</label>
                    <label class="radio-label"><input type="radio" name="website_rating" value="3"> 3</label>
                    <label class="radio-label"><input type="radio" name="website_rating" value="4"> 4</label>
                    <label class="radio-label"><input type="radio" name="website_rating" value="5"> 5</label>
                </div>
            </div>

            <!-- 3. From where you got this website -->
            <div class="form-group">
                <label for="source">From where you got this website?</label>
                <input type="text" id="source" name="referral_source" placeholder="e.g. Social media, Friend, Google" autocomplete="off">
            </div>

            <!-- 4. Rate the food -->
            <div class="form-group">
                <label for="food_rating">Rate the Food</label>
                <select id="food_rating" name="food_rating">
                    <option value="" disabled selected>Select your food rating</option>
                    <option value="Excellent">Excellent</option>
                    <option value="Good">Good</option>
                    <option value="Average">Average</option>
                    <option value="Poor">Poor</option>
                </select>
            </div>

            <!-- 5. Your contact number please -->
            <div class="form-group">
                <label for="phone">Your Contact Number Please</label>
                <input type="tel" id="phone" name="phone_number" placeholder="Enter your contact number" autocomplete="off">
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="submit-btn">Submit Feedback</button>
        </form>
    </div>

    <script>
        const form = document.getElementById("feedbackForm");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();
            
            submitBtn.textContent = "Submitting...";
            submitBtn.disabled = true;

            const formData = new FormData(form);

            try {
                const response = await fetch(form.action, {
                    method: "POST",
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    // Redirect directly to index.html on success
                    window.location.href = "index.html";
                } else {
                    alert("Submission failed. Please try again.");
                    submitBtn.textContent = "Submit Feedback";
                    submitBtn.disabled = false;
                }
            } catch (error) {
                alert("Network error. Please check your connection.");
                submitBtn.textContent = "Submit Feedback";
                submitBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
